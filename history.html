  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }

    .history-page { position:relative; z-index:2; flex:1; padding:0 0 100px; }

    /* ── HERO ── */
    .history-hero {
      position: relative;
      padding: 120px 60px 72px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .history-hero::before {
      content:''; position:absolute;
      width:700px; height:700px; border-radius:50%;
      background:radial-gradient(circle,rgba(35,26,165,.18) 0%,transparent 70%);
      top:-200px; right:-100px; pointer-events:none;
    }
    .history-hero::after {
      content:''; position:absolute;
      width:400px; height:400px; border-radius:50%;
      background:radial-gradient(circle,rgba(231,87,25,.1) 0%,transparent 70%);
      bottom:-100px; left:10%; pointer-events:none;
    }
    .history-hero-inner { position:relative; z-index:1; max-width:1400px; margin:0 auto; }
    .history-eyebrow {
      font-family:var(--font-mono); font-size:.68rem;
      letter-spacing:.3em; text-transform:uppercase;
      color:var(--orange); margin-bottom:18px;
      animation:fadeUp .6s ease both;
    }
    .history-eyebrow::before { content:'// '; opacity:.5; }
    .history-title {
      font-family:var(--font-display); font-weight:900;
      font-size:clamp(3.5rem,8vw,8rem); line-height:.88;
      text-transform:uppercase; letter-spacing:-.02em;
      color:var(--heading); margin-bottom:0;
      animation:fadeUp .65s .08s ease both; transition:color .35s;
    }
    .history-title .line-ghost { -webkit-text-stroke:2px rgba(35,26,165,.75); color:transparent; }
    .history-title .line-orange { color:var(--orange); }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* ── CONTROLS — see responsive block below ── */
    .history-select-wrap { position:relative; flex-shrink:0; }
    .history-select {
      appearance:none; -webkit-appearance:none;
      font-family:var(--font-mono); font-size:.72rem;
      letter-spacing:.1em; text-transform:uppercase;
      color:var(--text); background:var(--bg-card);
      border:1px solid var(--border); border-radius:4px;
      padding:12px 42px 12px 16px; cursor:pointer; outline:none;
      min-width:280px;
      transition:border-color .2s, background .35s, color .35s;
    }
    .history-select:hover { border-color:rgba(231,87,25,.5); }
    .history-select:focus { border-color:var(--orange); }
    .history-select option { background:var(--bg-card); color:var(--text); }
    .history-select-chev {
      pointer-events:none; position:absolute;
      right:13px; top:50%; transform:translateY(-50%);
      width:14px; height:14px; color:var(--orange);
    }

    /* ── CONTENT AREA ── */
    .history-content {
      max-width:1400px; margin:0 auto;
      padding:40px 60px 60px;
    }

    /* Category label above the grid */
    .award-category-label {
      font-family: var(--font-mono);
      font-size: .62rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 20px;
    }
    .award-category-label::before { content: '// '; opacity: .5; }

    /* ── AWARD CARD GRID ── */
    .award-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    /* ── AWARD CARD ── */
    /* Outer wrapper: ONLY handles hover scale — no animation here */
    .award-card {
      position: relative;
      width: 160px;
      flex-shrink: 0;
      cursor: default;
      transition: transform .22s cubic-bezier(.22,1,.36,1);
      transform-origin: bottom center;
      will-change: transform;
    }
    .award-card:hover {
      transform: translateY(-10px) scale(1.1);
      z-index: 10;
    }
    /* Inner wrapper carries the entrance animation so it never
       conflicts with the hover transform on the outer element */
    .award-card-inner {
      animation: cardIn .35s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(22px) scale(.95); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }

    /* The coloured rectangle — no border, no shadow */
    .award-card-photo {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      height: 220px;
      border: none;
    }

    /* 1 — Solid team colour fill */
    .award-card-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* 2 — Team logo: oversized, centered, behind player */
    .award-card-logo-bg {
      position: absolute;
      z-index: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130%;
      height: 130%;
      object-fit: contain;
      object-position: center center;
      opacity: .28;
      pointer-events: none;
    }

    /* 3 — Subtle gradient to help player pop over logo */
    .award-card-vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.08) 0%,
        rgba(0,0,0,.04) 40%,
        rgba(0,0,0,.28) 100%
      );
    }

    /* 4 — Player photo: fills card, bleeds slightly at bottom */
    .award-card-photo-wrap {
      position: absolute;
      z-index: 3;
      left: 0; right: 0;
      bottom: -12px; /* bleed past the card edge */
      top: 0;
      overflow: visible;
    }
    .award-card-photo-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 115%; /* slightly taller so figure fills card */
      object-fit: cover;
      object-position: top center;
    }
    /* Initials fallback */
    .award-card-initials {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 3.6rem;
      color: rgba(255,255,255,.35);
      letter-spacing: -.02em;
      z-index: 3;
    }

    /* No small corner logo badge — logo is the big background one only */
    .award-card-logo { display: none; }

    /* Caption below the photo */
    .award-card-caption {
      padding: 10px 2px 2px;
    }
    .award-card-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: .95rem;
      text-transform: uppercase;
      letter-spacing: .01em;
      color: var(--heading);
      line-height: 1.1;
      margin-bottom: 4px;
      transition: color .35s;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .award-card-season {
      font-family: var(--font-mono);
      font-size: .55rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--orange);
      opacity: .7;
    }

    /* ── CONTROLS ROW — flex, dropdown left, search right ── */
    .history-controls {
      max-width:1400px; margin:0 auto;
      padding:100px 60px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      animation: fadeUp .55s .2s ease both;
    }
    .history-controls-left  { display:flex; align-items:center; gap:14px; }
    .history-controls-right { display:flex; align-items:center; gap:0; }

    /* ── VIEW TOGGLE BUTTONS ── */
    .history-view-toggle {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px;
      margin-left: 10px;
    }
    .history-view-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .history-view-btn:hover { color: var(--text); }
    .history-view-btn.active {
      background: rgba(231,87,25,.15);
      color: var(--orange);
    }
    .history-view-btn svg { display:block; }

    /* ── LIST VIEW ── */
    .award-list-view {
      display: flex;
      flex-direction: column;
      gap: 6px;
      /* no max-width — rows span the full content area like cards */
    }
    .award-list-row {
      position: relative;
      display: flex;
      align-items: stretch;
      height: 88px;
      border-radius: 10px;
      overflow: hidden; /* clip portrait within row bounds */
      background: var(--bg-card);
      border: 1px solid var(--border);
      animation: listRowIn .32s cubic-bezier(.22,1,.36,1) both;
      cursor: default;
      transition: transform .18s cubic-bezier(.22,1,.36,1),
                  border-color .18s, background .35s;
    }
    .award-list-row:hover {
      transform: translateX(5px);
      border-color: rgba(231,87,25,.45);
      background: rgba(231,87,25,.04);
    }
    /* Left accent bar in team colour */
    .award-list-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--row-accent, var(--orange));
      transition: background .35s;
      z-index: 2;
    }
    @keyframes listRowIn {
      from { opacity:0; transform:translateX(-14px); }
      to   { opacity:1; transform:translateX(0); }
    }

    /* Portrait section — tall enough to show full torso */
    .award-list-row-thumb {
      position: relative;
      width: 120px;
      flex-shrink: 0;
      overflow: hidden;
      /* no border-radius — parent clips it */
    }
    .award-list-row-thumb-bg {
      position: absolute;
      inset: 0;
      opacity: .7;
    }
    .award-list-row-thumb-logo {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      opacity: .18;
      z-index: 1;
    }
    /* Portrait: anchored from top so head never clips */
    .award-list-row-thumb-photo {
      position: absolute;
      top: -6px;
      left: 0;
      width: 100%;
      height: calc(100% + 16px);
      object-fit: cover;
      object-position: top center;
      z-index: 3;
    }
    .award-list-row-thumb-initials {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2.2rem;
      color: rgba(255,255,255,.35);
      z-index: 2;
      letter-spacing: -.02em;
    }

    /* Main content */
    .award-list-row-main {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px 0 18px;
      min-width: 0;
    }
    .award-list-row-year {
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--orange);
      width: 42px;
      flex-shrink: 0;
    }
    .award-list-row-year::before { content: '// '; opacity: .5; }
    .award-list-row-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: -.01em;
      color: var(--heading);
      transition: color .35s;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Team section */
    .award-list-row-team {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px 0 0;
      flex-shrink: 0;
    }
    .award-list-row-team-logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      opacity: .9;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,.3));
    }
    .award-list-row-team-name {
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
      transition: color .35s;
    }
    .award-list-row:hover .award-list-row-team-name {
      color: var(--text);
    }

    @media (max-width: 768px) {
      .award-list-row-team-name { display: none; }
      .award-list-row-name { font-size: 1.1rem; }
      .award-list-row-thumb { width: 80px; }
    }

    @media (max-width: 768px) {
      .history-hero     { padding:88px 20px 48px; }
      .history-title    { font-size:clamp(3rem,13vw,5rem); }
      .history-controls { padding:28px 20px 0; flex-direction: column; align-items: stretch; }
      .history-controls-left, .history-controls-right { width: 100%; }
      .history-select   { min-width:0; width:100%; }
      .history-content  { padding:28px 20px 40px; }
      .award-card       { width:150px; }
      .award-card-logo  { width:36px; height:36px; bottom:9px; right:9px; }
    }
  </style>
</head>

    function getTeam(name, season) {
      /* 1. Check season-specific external entry */
      var key = name + '|' + season;
      if (EXT[key]) return EXT[key];
      /* 2. Check name-only external entry */
      if (EXT[name]) return EXT[name];
      /* 3. Look in PLAYER_STATS (EGE players) */
      if (window.PLAYER_STATS) {
        var keys = Object.keys(window.PLAYER_STATS);
        for (var i = 0; i < keys.length; i++) {
          var ps = window.PLAYER_STATS[keys[i]];
          /* Match by name from player-stats bio or by checking names table */
          var psName = (ps.info && ps.info.length) ? null : null;
          /* Use the PLAYERS name map if available */
          var found = false;
          if (window.PLAYERS) {
            var pk = keys[i];
            if (window.PLAYERS[pk] && window.PLAYERS[pk].name === name) found = true;
          }
          /* Simpler: match key display names */
          var nameMap = {
            'clark':'Cooper Clark','hatch':'Paxon Hatch',
            'stogsdill':'Sam Stogsdill','stewart':'Jaykeb Stewart','vitel':'Isaac Vitel'
          };
          if (nameMap[keys[i]] === name) {
            var rows = (ps.regular||[]).filter(function(r){return r.season===season;});
            if (rows.length) return rows[0].team;
          }
        }
      }
      return null;
    }

    function initials(name) {
      return name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);
    }

    /* ── BUILD ONE CARD ──
       team     → from entry.team (required — no auto-detection)
       headshot → from entry.headshot (URL string, optional) */
    function buildCard(name, season, idx, team, headshot) {
      var colors = TC[team] || { p:'#231aa5', s:'#e75719' };
      var logo   = team ? (TL[team] || '') : '';

      var card = document.createElement('div');
      card.className = 'award-card';

      /* Inner wrapper carries the entrance animation */
      var inner = document.createElement('div');
      inner.className = 'award-card-inner';
      inner.style.animationDelay = (idx * 0.045) + 's';

      /* .award-card-photo — rounded rect */
      var photo = document.createElement('div');
      photo.className = 'award-card-photo';

      /* 1. Background colour gradient */
      var bg = document.createElement('div');
      bg.className = 'award-card-bg';
      bg.style.background = 'linear-gradient(150deg,' + colors.p + ' 0%,' +
        shadeBlend(-0.35, colors.p) + ' 60%,' +
        colors.s + ' 140%)';
      photo.appendChild(bg);

      /* 2. Large background logo watermark — behind headshot */
      if (logo) {
        var logoBg = document.createElement('img');
        logoBg.className = 'award-card-logo-bg';
        logoBg.src = logo;
        logoBg.alt = '';
        photo.appendChild(logoBg);
      }

      /* 3. Vignette — above bg logo, below headshot */
      var vig = document.createElement('div');
      vig.className = 'award-card-vignette';
      photo.appendChild(vig);

      /* 4. Headshot — sits above vignette */
      var photoWrap = document.createElement('div');
      photoWrap.className = 'award-card-photo-wrap';

      if (headshot) {
        var img = document.createElement('img');
        img.src = headshot;
        img.alt = name;
        img.onerror = function() {
          this.style.display = 'none';
          var ini = document.createElement('div');
          ini.className = 'award-card-initials';
          ini.textContent = initials(name);
          photoWrap.appendChild(ini);
        };
        photoWrap.appendChild(img);
      } else {
        var ini = document.createElement('div');
        ini.className = 'award-card-initials';
        ini.textContent = initials(name);
        photoWrap.appendChild(ini);
      }
      photo.appendChild(photoWrap);

      /* 5. Small corner logo badge — on top of headshot */
      if (logo) {
        var logoEl = document.createElement('img');
        logoEl.className = 'award-card-logo';
        logoEl.src = logo;
        logoEl.alt = team || '';
        photo.appendChild(logoEl);
      }

      inner.appendChild(photo);

      /* Caption below the photo */
      var cap = document.createElement('div');
      cap.className = 'award-card-caption';
      cap.innerHTML =
        '<div class="award-card-name">' + name + '</div>' +
        '<div class="award-card-season">' + season + '</div>';
      inner.appendChild(cap);

      card.appendChild(inner);
      return card;
    }

    /* Darken a hex colour by a factor (negative = darker) */
    function shadeBlend(p, c) {
      var f = parseInt(c.slice(1),16);
      var R = f>>16, G = f>>8&0xFF, B = f&0xFF;
      var t = p < 0 ? 0 : 255;
      var a = p < 0 ? -p : p;
      return '#' + (0x1000000 +
        (Math.round((t-R)*a)+R)*0x10000 +
        (Math.round((t-G)*a)+G)*0x100  +
        (Math.round((t-B)*a)+B)
      ).toString(16).slice(1);
    }

    /* ── VIEW MODE ── */
    var viewMode = 'card'; // 'card' | 'list'

    /* ── BUILD ONE LIST ROW ── */
    function buildListRow(name, season, idx, team, headshot) {
      var colors = TC[team] || { p:'#231aa5', s:'#e75719' };
      var logo   = team ? (TL[team] || '') : '';

      var row = document.createElement('div');
      row.className = 'award-list-row';
      row.style.animationDelay = (idx * 0.035) + 's';
      /* Team primary colour drives the left accent bar */
      row.style.setProperty('--row-accent', colors.p);

      /* ── Thumb: team gradient bg + logo watermark + portrait ── */
      var thumb = document.createElement('div');
      thumb.className = 'award-list-row-thumb';

      var tbg = document.createElement('div');
      tbg.className = 'award-list-row-thumb-bg';
      tbg.style.background = 'linear-gradient(160deg,' + colors.p + ' 0%,' + shadeBlend(-0.3, colors.p) + ' 100%)';
      thumb.appendChild(tbg);

      if (logo) {
        var tlogo = document.createElement('img');
        tlogo.className = 'award-list-row-thumb-logo';
        tlogo.src = logo; tlogo.alt = '';
        thumb.appendChild(tlogo);
      }

      if (headshot) {
        var tphoto = document.createElement('img');
        tphoto.className = 'award-list-row-thumb-photo';
        tphoto.src = headshot; tphoto.alt = name;
        tphoto.onerror = function() {
          this.style.display = 'none';
          var ini = document.createElement('div');
          ini.className = 'award-list-row-thumb-initials';
          ini.textContent = initials(name);
          thumb.appendChild(ini);
        };
        thumb.appendChild(tphoto);
      } else {
        var ini = document.createElement('div');
        ini.className = 'award-list-row-thumb-initials';
        ini.textContent = initials(name);
        thumb.appendChild(ini);
      }
      row.appendChild(thumb);

      /* ── Main: year // name — uses site background, not team colour ── */
      var main = document.createElement('div');
      main.className = 'award-list-row-main';

      var yearEl = document.createElement('span');
      yearEl.className = 'award-list-row-year';
      /* Extract ending year: '2027-28' → '2028' */
      var parts = (season || '').split('-');
      var endYear = parts.length >= 2
        ? (parts[0].slice(0,2) + parts[1])   /* e.g. '20' + '28' = '2028' */
        : season;
      yearEl.textContent = endYear;
      main.appendChild(yearEl);

      var nameEl = document.createElement('span');
      nameEl.className = 'award-list-row-name';
      nameEl.textContent = name;
      main.appendChild(nameEl);

      row.appendChild(main);

      /* ── Team: logo + name right-aligned ── */
      var teamEl = document.createElement('div');
      teamEl.className = 'award-list-row-team';

      if (logo) {
        var teamLogo = document.createElement('img');
        teamLogo.className = 'award-list-row-team-logo';
        teamLogo.src = logo; teamLogo.alt = team || '';
        teamEl.appendChild(teamLogo);
      }
      var teamName = document.createElement('span');
      teamName.className = 'award-list-row-team-name';
      teamName.textContent = team || '';
      teamEl.appendChild(teamName);
      row.appendChild(teamEl);

      return row;
    }

    /* ── RENDER ── */
    function render(category) {
      var history = window.EGE_LEAGUE_HISTORY || [];
      var content = document.getElementById('history-content');
      if (!content) return;

      /* Newest first */
      var list = history.slice().reverse();

      var LABELS = {
        mvp:      'Most Valuable Player',
        roty:     'Rookie of the Year',
        dpoy:     'Defensive Player of the Year',
        mip:      'Most Improved Player',
        sixmoty:  'Sixth Man of the Year',
        champion: 'Finals MVP',
      };
      var label = document.createElement('p');
      label.className = 'award-category-label';
      label.textContent = LABELS[category] || category;

      var container = document.createElement('div');
      container.className = viewMode === 'list' ? 'award-list-view' : 'award-grid';

      list.forEach(function(entry, idx) {
        var name, team, headshot;

        if (category === 'champion') {
          name     = entry.finals_mvp          || null;
          team     = entry.finals_mvp_team     || entry.champion || null;
          headshot = entry.finals_mvp_headshot || null;
        } else {
          name     = entry[category]               || null;
          team     = entry[category + '_team']     || null;
          headshot = entry[category + '_headshot'] || null;
        }

        if (!name || name === 'N/A') return;

        if (viewMode === 'list') {
          container.appendChild(buildListRow(name, entry.season, idx, team, headshot));
        } else {
          container.appendChild(buildCard(name, entry.season, idx, team, headshot));
        }
      });

      content.innerHTML = '';
      content.appendChild(label);
      content.appendChild(container);
    }

    function renderCategory() {
      var sel = document.getElementById('history-category');
      render(sel ? sel.value : 'mvp');
    }

    /* ── INIT ── */
    function init() {
      var sim = window.EGE_SIM || { leagueHistoryFile:'league-history.js' };
      var s   = document.createElement('script');
      s.src   = sim.leagueHistoryFile;
      s.onload = function() {
        renderCategory();

        /* View toggle buttons */
        var btnCard = document.getElementById('view-card');
        var btnList = document.getElementById('view-list');
        function setViewMode(mode) {
          viewMode = mode;
          if (btnCard) btnCard.classList.toggle('active', mode === 'card');
          if (btnList) btnList.classList.toggle('active', mode === 'list');
          renderCategory();
        }
        if (btnCard) btnCard.addEventListener('click', function() { setViewMode('card'); });
        if (btnList) btnList.addEventListener('click', function() { setViewMode('list'); });

        /* Category dropdown */
        var sel = document.getElementById('history-category');
        if (sel) sel.addEventListener('change', function() { renderCategory(); });
      };
      document.body.appendChild(s);
    }

    init();

  })();
  </script>
