<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="EGE_Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Results · EGE NBA Simulation</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <script src="sim-config.js"></script>
    <style>
    body{display:flex;flex-direction:column;min-height:100vh;}
    body>footer{margin-top:auto;}
    .results-wrap{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:100px 60px 80px;width:100%;box-sizing:border-box;flex:1;}
    .results-eyebrow{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.28em;text-transform:uppercase;color:var(--orange);margin-bottom:12px;}
    .results-eyebrow::before{content:"// ";opacity:.5;}
    .results-title{font-family:var(--font-display);font-weight:900;font-size:clamp(2rem,4vw,3.5rem);text-transform:uppercase;letter-spacing:-.01em;color:var(--heading);margin-bottom:6px;transition:color .35s;}
    .results-meta{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;}
    .results-actions{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap;}
    .results-btn{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;border:1px solid var(--border);padding:9px 18px;background:transparent;color:var(--text-muted);cursor:pointer;transition:color .2s,border-color .2s;}
    .results-btn:hover{color:var(--orange);border-color:var(--orange);}
    .results-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;}
    .results-btn.primary:hover{opacity:.85;}
    .result-q{margin-bottom:32px;border:1px solid var(--border);background:var(--bg-card);overflow:hidden;transition:background .35s;}
    .result-q-header{padding:12px 20px;border-bottom:1px solid var(--border-soft);background:rgba(35,26,165,.07);display:flex;align-items:center;gap:10px;}
    .result-q-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;animation:blink 1.8s ease-in-out infinite;}
    .result-q-title{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);}
    .result-q-body{padding:18px 24px 22px;}
    .result-q-question{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--heading);margin-bottom:18px;transition:color .35s;}
    .result-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .result-bar-rank{font-family:var(--font-mono);font-size:.52rem;color:var(--text-muted);width:20px;flex-shrink:0;text-align:right;}
    .result-bar-label{font-family:var(--font-body);font-size:.88rem;color:var(--text);width:190px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .result-bar-track{flex:1;height:22px;background:rgba(35,26,165,.15);position:relative;overflow:hidden;}
    .result-bar-fill{height:100%;transition:width .8s cubic-bezier(.16,1,.3,1);min-width:3px;}
    .result-bar-fill.rank-1{background:linear-gradient(90deg,#c9a84c,#f5d060);}
    .result-bar-fill.rank-2{background:linear-gradient(90deg,#6b7280,#9ca3af);}
    .result-bar-fill.rank-3{background:linear-gradient(90deg,#92400e,#cd7c42);}
    .result-bar-fill.top{background:linear-gradient(90deg,var(--orange),#ff9a5c);}
    .result-bar-fill.other{background:linear-gradient(90deg,rgba(35,26,165,.7),rgba(35,26,165,.9));}
    .result-bar-stat{font-family:var(--font-mono);font-size:.6rem;color:var(--text-muted);width:52px;text-align:right;flex-shrink:0;}
    .result-bar-pct{font-family:var(--font-mono);font-size:.62rem;color:var(--orange);width:44px;text-align:right;flex-shrink:0;font-weight:700;}
    .tier-scoreboard{display:flex;flex-direction:column;gap:5px;}
    .tier-score-row{display:flex;align-items:center;gap:10px;}
    .tier-score-name{font-family:var(--font-body);font-size:.88rem;color:var(--text);width:180px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tier-score-bar{flex:1;height:18px;background:rgba(35,26,165,.15);overflow:hidden;}
    .tier-score-fill{height:100%;background:linear-gradient(90deg,var(--orange),#ff9a5c);transition:width .8s cubic-bezier(.16,1,.3,1);}
    .tier-score-avg{font-family:var(--font-mono);font-size:.58rem;color:var(--orange);width:52px;text-align:right;font-weight:700;}
    .tier-score-dist{font-family:var(--font-mono);font-size:.46rem;color:var(--text-muted);width:110px;text-align:right;flex-shrink:0;}
    .tier-heatmap{display:flex;flex-direction:column;gap:6px;}
    .tier-heatmap-row{display:flex;align-items:center;gap:0;}
    .tier-heatmap-label{font-family:var(--font-display);font-weight:900;font-size:1.2rem;width:36px;flex-shrink:0;text-align:center;}
    .tier-heatmap-label.S{color:#c9a84c;}.tier-heatmap-label.A{color:#22c55e;}
    .tier-heatmap-label.B{color:#3b82f6;}.tier-heatmap-label.C{color:#6b7280;}.tier-heatmap-label.D{color:#ef4444;}
    .tier-heatmap-cells{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
    .tier-heatmap-cell{font-family:var(--font-mono);font-size:.46rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border:1px solid var(--border);color:var(--text-muted);white-space:nowrap;position:relative;overflow:hidden;}
    .tier-heatmap-cell.has-votes{color:var(--heading);}
    .tier-heatmap-cell .cell-fill{position:absolute;inset:0;pointer-events:none;}
    .tier-heatmap-cell .cell-count{position:relative;z-index:1;}
    .pick3-podium{display:flex;align-items:flex-end;gap:12px;margin-bottom:24px;height:110px;}
    .podium-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
    .podium-block{width:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:1.4rem;}
    .podium-block.gold{background:linear-gradient(180deg,#ffe066,#c9a84c);color:#3d2800;height:90px;}
    .podium-block.silver{background:linear-gradient(180deg,#e8e8e8,#9ca3af);color:#1a1a1a;height:70px;}
    .podium-block.bronze{background:linear-gradient(180deg,#f0a060,#cd7c42);color:#2a0e00;height:55px;}
    .podium-name{font-family:var(--font-mono);font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text);text-align:center;line-height:1.4;}
    .podium-pts{font-family:var(--font-mono);font-size:.48rem;color:var(--text-muted);}
    .pick3-full-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
    .individual-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px;}
    .individual-card{border:1px solid var(--border);padding:10px 12px;background:rgba(35,26,165,.04);}
    .individual-name{font-family:var(--font-mono);font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:6px;}
    .individual-val{font-family:var(--font-body);font-size:.78rem;color:var(--text);line-height:1.5;}
    .result-toggle{font-family:var(--font-mono);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border:none;background:none;padding:8px 0;margin-top:14px;display:flex;align-items:center;gap:6px;}
    .result-toggle:before{content:"* ";font-size:.4rem;}
    .result-toggle.open:before{content:"v ";}
    .result-toggle:hover{color:var(--orange);}
    .result-individual{display:none;}
    .result-individual.open{display:block;}
    .result-empty{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);opacity:.5;padding:8px 0;}
    .results-raw{display:none;margin-top:20px;overflow-x:auto;border:1px solid var(--border);}
    .results-raw.visible{display:block;}
    .results-raw table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:.58rem;}
    .results-raw th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;background:var(--bg-card);}
    .results-raw td{padding:7px 12px;border-bottom:1px solid var(--border-soft);color:var(--text);vertical-align:top;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .results-raw tr:last-child td{border-bottom:none;}
    .results-raw td .delete-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:.85rem;padding:2px 4px;opacity:.4;transition:opacity .15s,color .15s;}
    .results-raw td .delete-btn:hover{opacity:1;color:#ef4444;}
    @media(max-width:768px){.results-wrap{padding:80px 20px 60px;}.gate-box{padding:32px 24px;}.result-bar-label{width:120px;font-size:.78rem;}}
  </style>
</head>

  <script>
  (function(){
    var SUPABASE_URL = 'https://wspmprjqqhtxekzyensq.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzcG1wcmpxcWh0eGVrenllbnNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjQ3MDMsImV4cCI6MjA5MDI0MDcwM30.UrPDj26pC7P5D6grI6LGCzhC76-U0IYibQAbwycWE-Y';
    var TABLE = 'survey_responses';

    var QUESTIONS = [
      { key:'career_ranking',        type:'ranking',           label:'The Michael Jordan Greatest Player Award' },
      { key:'offensive_ranking',     type:'offensive-ranking', label:'The LeBron James Greatest Offensive Player Award' },
      { key:'defensive_ranking',     type:'defensive-ranking', label:'The Hakeem Olajuwon Defensive Player Award' },
      { key:'best_season',           type:'season-ranking',    label:'The Stephen Curry Greatest Regular Season Award' },
      { key:'playoff_ranking',       type:'playoff-ranking',   label:'The Kawhi Leonard Greatest Playoff Run Award' },
      { key:'riser_ranking',         type:'riser-ranking',     label:'The Jimmy Butler Playoff Riser Award' },
      { key:'clutch_ranking',        type:'clutch-ranking',    label:'The Reggie Miller Clutch Performer Award' },
      { key:'roleplayer_ranking',    type:'roleplayer-ranking',label:'The Ron Harper Roleplayer Award' },
      { key:'perf_ranking',          type:'perf-ranking',      label:'The Bam Adebayo Greatest Performance Award' },
      { key:'pippen_tierlist',       type:'tierlist',          label:'The Scottie Pippen Greatest Teammate Award' },
      { key:'tweet_tierlist',        type:'tweet-tierlist',    label:'The Terry Rozier Greatest Tweet Award' },
      { key:'duo_tierlist',          type:'duo-tierlist',      label:"The Shaquille O'Neal & Kobe Bryant Greatest Duo Award" },
      { key:'rivalry_tierlist',      type:'rivalry-tierlist',  label:'The Magic Johnson & Larry Bird Greatest Rivalry Award' },
      { key:'phil_jackson_tierlist', type:'phil-tierlist',     label:'The Phil Jackson Greatest Team Award' },
      { key:'best_moment',           type:'pick3',             label:'The Ray Allen Best Moment Award' },
      { key:'unexpected_moment',     type:'pick3',             label:'The Jeremy Lin Most Unexpected Moment Award' },
      { key:'worst_trade',           type:'pick3',             label:'The Paul George Worst Trade Award' },
    ];

    var RANKING_TYPES = ['ranking','offensive-ranking','defensive-ranking','season-ranking',
      'playoff-ranking','riser-ranking','clutch-ranking','roleplayer-ranking','perf-ranking'];
    var TIER_TYPES = ['tierlist','tweet-tierlist','duo-tierlist','rivalry-tierlist','phil-tierlist'];
    var TIER_COLORS = {S:'#c9a84c',A:'#22c55e',B:'#3b82f6',C:'#6b7280',D:'#ef4444'};
    var PICK3_LABELS = {
      jaykeb_mvp:'Jaykeb winning MVP', cooper_paxon_2026:'Cooper & Paxon 2026 Championship',
      paxon_2022:'Paxon 2022 Championship Run', jokic_vitel_wcf:'Jokic/Vitel vs Hatch/Clark WCF',
      hatch_clark_finals:'Hatch/Clark vs Jaykeb Finals', hatch_tatum:'Hatch vs Tatum R1',
      sam_mexico:"Sam's Mexico City Championship", clark_retirement:'Clark 2037 Retirement Tour',
      final_post:'The Final Post', ucla_natty:'UCLA National Championship',
      duke_natty:'Duke National Championship', clark_sweep_gsw:'Clark Sweeping Golden State',
      isaac_42:'Isaac 42pts March Madness',
      jaykeb_ny_trade:'Jaykeb Traded to New York', paxon_retirement:"Paxon's Sudden Retirement",
      isaac_trade_denver:'Isaac Trade Request to Denver', jaykeb_chi_sign:'Jaykeb Signs with Chicago',
      paxon_2022_run:'Paxon 2022 Championship Run', sam_jumpshot:'Sam Develops a Jumpshot',
      isaac_lost_jumpshot:'Isaac Loses His Jumpshot', paxon_115_gsw:'Paxon 1-15 vs Golden State',
      cooper_lakers_sign:'Cooper Signs with Lakers', cooper_spurs_trade:'Cooper Traded to Spurs',
      clark_pacers:'Clark to the Pacers', clark_spurs:'Clark to the Spurs',
      isaac_nuggets:'Isaac Vitel to the Nuggets', jaykeb_knicks:'Jaykeb to the Knicks',
      sam_rockets:'Sam Stogsdill to the Rockets', sam_flight:'Sam Stogsdill to the Flight'
    };

    function sbHeaders(extra){ return Object.assign({'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},extra||{}); }

    var allRows = [];
    function loadResults(){
      var metaEl = document.getElementById('results-meta');
      metaEl.textContent = 'Step 1: Sending request to Supabase...';

      // Timeout fallback so we know if fetch never resolves
      var timeoutId = setTimeout(function(){
        metaEl.textContent = 'Step 1 TIMEOUT: Fetch never resolved after 10s. Check network/CORS.';
      }, 10000);

      fetch(SUPABASE_URL+'/rest/v1/'+TABLE+'?select=token,name,answers,updated_at&order=updated_at.desc', {headers:sbHeaders()})
        .then(function(r){
          clearTimeout(timeoutId);
          metaEl.textContent = 'Step 2: Got response, status='+r.status+', ok='+r.ok;
          if (!r.ok) {
            return r.text().then(function(t){ throw new Error('HTTP '+r.status+': '+t); });
          }
          return r.json();
        })
        .then(function(data){
          metaEl.textContent = 'Step 3: Parsed JSON, type='+typeof data+', isArray='+Array.isArray(data)+', length='+(Array.isArray(data)?data.length:'N/A');
          if (!Array.isArray(data)) {
            throw new Error('Not an array: '+JSON.stringify(data).slice(0,300));
          }
          allRows = data;
          metaEl.textContent = 'Step 4: Rendering '+data.length+' rows...';
          try { renderResults(allRows); } catch(e) { metaEl.textContent = 'Step 4 CRASH in renderResults: '+e.message; console.error(e); return; }
          metaEl.textContent = 'Step 5: Rendering raw table...';
          try { renderRaw(allRows); } catch(e) { console.error('renderRaw error:', e); }
        })
        .catch(function(err){
          clearTimeout(timeoutId);
          metaEl.textContent = 'FETCH ERROR: '+err.message;
          console.error('loadResults error:', err);
        });
    }
    document.getElementById('refresh-btn').addEventListener('click', loadResults);

    function renderResults(rows){
      var meta = document.getElementById('results-meta');
      var body = document.getElementById('results-body');
      var names = rows.map(function(r){return r.name||r.token;}).filter(Boolean);
      meta.textContent = rows.length+' response'+(rows.length!==1?'s':'')+' - '+names.join(', ');
      body.innerHTML = '';
      QUESTIONS.forEach(function(q){
        var card = document.createElement('div'); card.className='result-q';
        card.innerHTML = '<div class="result-q-header"><div class="result-q-dot"></div>'
          +'<span class="result-q-title">'+q.key.replace(/_/g,' ')+'</span></div>'
          +'<div class="result-q-body"><div class="result-q-question">'+q.label+'</div>'
          +'<div id="ans_'+q.key+'"></div></div>';
        body.appendChild(card);
        renderQ(q, rows, document.getElementById('ans_'+q.key));
      });
    }

    function renderQ(q,rows,el){
      if(TIER_TYPES.indexOf(q.type)>-1) renderTierlist(q,rows,el);
      else if(RANKING_TYPES.indexOf(q.type)>-1) renderRanking(q,rows,el);
      else if(q.type==='pick3') renderPick3(q,rows,el);
      else if(q.type==='radio') renderRadio(q,rows,el);
      else el.innerHTML='<div class="result-empty">No display for this type.</div>';
    }

    function renderRanking(q,rows,el){
      var totals={},counts={},names=[];
      rows.forEach(function(r){
        var arr=r.answers&&r.answers[q.key]; if(!Array.isArray(arr)) return;
        arr.forEach(function(n,i){ if(!n) return; if(names.indexOf(n)<0) names.push(n); totals[n]=(totals[n]||0)+(i+1); counts[n]=(counts[n]||0)+1; });
      });
      if(!names.length){el.innerHTML='<div class="result-empty">No responses yet.</div>';return;}
      var players=names.map(function(n){return{name:n,avg:totals[n]/counts[n]};}).sort(function(a,b){return a.avg-b.avg;});
      var minA=players[0].avg, maxA=players[players.length-1].avg;
      var bars=players.map(function(p,i){
        var w=maxA===minA?80:Math.round((1-(p.avg-minA)/(maxA-minA))*85+15);
        var fc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'other';
        return '<div class="result-bar-row"><div class="result-bar-rank">'+(i+1)+'.</div>'
          +'<div class="result-bar-label">'+esc(clean(p.name))+'</div>'
          +'<div class="result-bar-track"><div class="result-bar-fill '+fc+'" style="width:'+w+'%"></div></div>'
          +'<div class="result-bar-stat">avg #'+p.avg.toFixed(1)+'</div></div>';
      }).join('');
      var indCards=rows.map(function(r){
        var arr=r.answers&&r.answers[q.key]; if(!Array.isArray(arr)||!arr.length) return '';
        return '<div class="individual-card"><div class="individual-name">'+esc(r.name||r.token||'?')+'</div>'
          +'<div class="individual-val">'+arr.map(function(n,i){return(i+1)+'. '+esc(clean(n));}).join('<br>')+'</div></div>';
      }).filter(Boolean).join('');
      el.innerHTML=bars+togHtml(q.key,rows.length,indCards);
      wireToggle(q.key);
    }

    function renderTierlist(q,rows,el){
      var tally={},players=[];
      rows.forEach(function(r){
        var val=r.answers&&r.answers[q.key]; if(!val||typeof val!=='object') return;
        Object.keys(val).forEach(function(p){
          if(players.indexOf(p)<0) players.push(p);
          if(!tally[p]) tally[p]={pts:0,cnt:0,tiers:{S:0,A:0,B:0,C:0,D:0}};
          var pts={S:5,A:4,B:3,C:2,D:1}[val[p]]||0;
          tally[p].pts+=pts; tally[p].cnt++;
          if(tally[p].tiers[val[p]]!==undefined) tally[p].tiers[val[p]]++;
        });
      });
      if(!players.length){el.innerHTML='<div class="result-empty">No responses yet.</div>';return;}
      players.sort(function(a,b){return(tally[b].pts/tally[b].cnt)-(tally[a].pts/tally[a].cnt);});
      var maxS=tally[players[0]].pts/tally[players[0]].cnt;
      var score='<div class="tier-scoreboard">'+players.map(function(p,i){
        var d=tally[p]; var avg=(d.pts/d.cnt).toFixed(2);
        var w=maxS>0?(d.pts/d.cnt/maxS*100).toFixed(1):0;
        var dist=['S','A','B','C','D'].map(function(t){return d.tiers[t]>0?t+'x'+d.tiers[t]:'';}).filter(Boolean).join(' ');
        return '<div class="tier-score-row"><div class="result-bar-rank">'+(i+1)+'.</div>'
          +'<div class="tier-score-name">'+esc(clean(p))+'</div>'
          +'<div class="tier-score-bar"><div class="tier-score-fill" style="width:'+w+'%"></div></div>'
          +'<div class="tier-score-avg">'+avg+'</div>'
          +'<div class="tier-score-dist">'+dist+'</div></div>';
      }).join('')+'</div>';
      var hm='<div class="tier-heatmap" style="margin-top:20px;">';
      ['S','A','B','C','D'].forEach(function(tier){
        var cells=players.map(function(p){
          var cnt=tally[p]?tally[p].tiers[tier]||0:0;
          var op=rows.length>0?cnt/rows.length:0;
          return '<div class="tier-heatmap-cell'+(cnt>0?' has-votes':'')+'"><div class="cell-fill" style="background:'+TIER_COLORS[tier]+';opacity:'+op+';"></div>'
            +'<span class="cell-count">'+esc(clean(p).split(' ')[0])+(cnt>0?' x'+cnt:'')+'</span></div>';
        }).join('');
        hm+='<div class="tier-heatmap-row"><div class="tier-heatmap-label '+tier+'">'+tier+'</div><div class="tier-heatmap-cells">'+cells+'</div></div>';
      });
      hm+='</div>';
      var indCards=rows.map(function(r){
        var val=r.answers&&r.answers[q.key]; if(!val||!Object.keys(val).length) return '';
        var lines=Object.keys(val).map(function(p){return val[p]+': '+clean(p);}).join(', ');
        return '<div class="individual-card"><div class="individual-name">'+esc(r.name||r.token||'?')+'</div>'
          +'<div class="individual-val">'+esc(lines)+'</div></div>';
      }).filter(Boolean).join('');
      el.innerHTML=score+hm+togHtml(q.key,rows.length,indCards);
      wireToggle(q.key);
    }

    function renderPick3(q,rows,el){
      var tally={};
      rows.forEach(function(r){
        var arr=r.answers&&r.answers[q.key]; if(!Array.isArray(arr)) return;
        arr.forEach(function(v,i){
          if(!v) return; if(!tally[v]) tally[v]={pts:0,gold:0,silver:0,bronze:0};
          tally[v].pts+=[3,2,1][i]||0;
          if(i===0) tally[v].gold++; else if(i===1) tally[v].silver++; else if(i===2) tally[v].bronze++;
        });
      });
      var sorted=Object.keys(tally).sort(function(a,b){return tally[b].pts-tally[a].pts;});
      if(!sorted.length){el.innerHTML='<div class="result-empty">No responses yet.</div>';return;}
      var podOrder=sorted.length>=3?[sorted[1],sorted[0],sorted[2]]:sorted.length===2?[sorted[1],sorted[0]]:[sorted[0]];
      var mc=['silver','gold','bronze'], mm=['#2','#1','#3'];
      var pod='<div class="pick3-podium">'+podOrder.map(function(v,pi){
        var d=tally[v]; var label=PICK3_LABELS[v]||v;
        return '<div class="podium-col"><div class="podium-name">'+esc(label)+'</div>'
          +'<div class="podium-pts">'+d.pts+' pts</div>'
          +'<div class="podium-block '+mc[pi]+'">'+mm[pi]+'</div></div>';
      }).join('')+'</div>';
      var maxPts=tally[sorted[0]].pts||1;
      var list='<div class="pick3-full-list">'+sorted.map(function(v,i){
        var d=tally[v]; var label=PICK3_LABELS[v]||v;
        var w=(d.pts/maxPts*100).toFixed(1);
        var med=(d.gold?'G:'+d.gold+' ':'')+(d.silver?'S:'+d.silver+' ':'')+(d.bronze?'B:'+d.bronze:'');
        return '<div class="result-bar-row"><div class="result-bar-rank">'+(i+1)+'.</div>'
          +'<div class="result-bar-label">'+esc(label)+'</div>'
          +'<div class="result-bar-track"><div class="result-bar-fill '+(i<3?['rank-1','rank-2','rank-3'][i]:'other')+'" style="width:'+w+'%"></div></div>'
          +'<div class="result-bar-stat" style="width:80px;font-size:.44rem;">'+med.trim()+'</div>'
          +'<div class="result-bar-pct">'+d.pts+'pts</div></div>';
      }).join('')+'</div>';
      var indCards=rows.map(function(r){
        var arr=r.answers&&r.answers[q.key]; if(!Array.isArray(arr)||!arr.length) return '';
        return '<div class="individual-card"><div class="individual-name">'+esc(r.name||r.token||'?')+'</div>'
          +'<div class="individual-val">'+arr.map(function(v,i){return ['Gold','Silver','Bronze'][i]+': '+(PICK3_LABELS[v]||v);}).join('<br>')+'</div></div>';
      }).filter(Boolean).join('');
      el.innerHTML=pod+list+togHtml(q.key,rows.length,indCards);
      wireToggle(q.key);
    }

    function renderRadio(q,rows,el){
      var tally={};
      rows.forEach(function(r){var v=r.answers&&r.answers[q.key]; if(v) tally[v]=(tally[v]||0)+1;});
      var total=Object.values(tally).reduce(function(s,v){return s+v;},0);
      var sorted=Object.keys(tally).sort(function(a,b){return tally[b]-tally[a];});
      if(!sorted.length){el.innerHTML='<div class="result-empty">No responses yet.</div>';return;}
      el.innerHTML=sorted.map(function(v,i){
        var c=tally[v],pct=total?Math.round(c/total*100):0;
        return '<div class="result-bar-row"><div class="result-bar-rank">'+(i+1)+'.</div>'
          +'<div class="result-bar-label">'+esc(v)+'</div>'
          +'<div class="result-bar-track"><div class="result-bar-fill '+(i===0?'top':'other')+'" style="width:'+(total?c/total*100:0)+'%"></div></div>'
          +'<div class="result-bar-stat">'+c+'</div><div class="result-bar-pct">'+pct+'%</div></div>';
      }).join('');
    }

    function renderRaw(rows){
      var el=document.getElementById('results-raw');
      if(!rows.length){el.innerHTML='<div style="font-family:var(--font-mono);font-size:.6rem;color:var(--text-muted);padding:12px;">No responses.</div>';return;}
      var keys=QUESTIONS.map(function(q){return q.key;});
      var th='<tr><th></th><th>Name</th><th>Date</th>'+keys.map(function(k){return '<th>'+k.replace(/_/g,' ')+'</th>';}).join('')+'</tr>';
      var tb=rows.map(function(r){
        var date=r.updated_at?new Date(r.updated_at).toLocaleDateString():'---';
        var cells=keys.map(function(k){
          var v=r.answers&&r.answers[k];
          var d=v==null?'---':Array.isArray(v)?v.join(' > '):typeof v==='object'?JSON.stringify(v):String(v);
          return '<td title="'+esc(d)+'">'+esc(d.slice(0,35))+'</td>';
        }).join('');
        return '<tr><td><button class="delete-btn" data-token="'+esc(r.token||'')+'" title="Delete">X</button></td>'
          +'<td>'+esc(r.name||r.token||'---')+'</td><td>'+date+'</td>'+cells+'</tr>';
      }).join('');
      el.innerHTML='<table><thead>'+th+'</thead><tbody>'+tb+'</tbody></table>';
      el.querySelectorAll('.delete-btn').forEach(function(btn){
        btn.addEventListener('click',function(){
          if(!confirm('Delete response for "'+btn.dataset.token+'"?')) return;
          fetch(SUPABASE_URL+'/rest/v1/'+TABLE+'?token=eq.'+encodeURIComponent(btn.dataset.token),
            {method:'DELETE',headers:sbHeaders()})
            .then(function(r){if(r.ok||r.status===204){allRows=allRows.filter(function(row){return row.token!==btn.dataset.token;});renderResults(allRows);renderRaw(allRows);}});
        });
      });
    }

    document.getElementById('csv-btn').addEventListener('click',function(){
      if(!allRows.length){alert('No data to export.');return;}
      var keys=QUESTIONS.map(function(q){return q.key;});
      var hdr=['Name','Submitted'].concat(keys);
      var csvR=[hdr.map(cc).join(',')];
      allRows.forEach(function(r){
        var date=r.updated_at?new Date(r.updated_at).toLocaleDateString():'';
        var cells=keys.map(function(k){
          var v=r.answers&&r.answers[k];
          if(v==null) return '';
          if(Array.isArray(v)) return v.join(' > ');
          if(typeof v==='object') return Object.keys(v).map(function(p){return p+':'+v[p];}).join(' | ');
          return String(v);
        });
        csvR.push([r.name||r.token||'',date].concat(cells).map(cc).join(','));
      });
      var blob=new Blob([csvR.join('\n')],{type:'text/csv;charset=utf-8;'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=url; a.download='ege-survey-results.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    });
    function cc(v){var s=String(v||'');if(s.search(/[",\n]/)>=0)s='"'+s.replace(/"/g,'""')+'"';return s;}

    document.getElementById('raw-toggle').addEventListener('click',function(){
      var el=document.getElementById('results-raw'); var vis=el.classList.toggle('visible');
      this.textContent=vis?'Hide Raw Responses':'Show Raw Responses';
    });

    function togHtml(key,count,cards){
      return '<button class="result-toggle" id="tog_'+key+'">Individual Responses ('+count+')</button>'
        +'<div class="result-individual" id="ind_'+key+'"><div class="individual-grid">'+cards+'</div></div>';
    }
    function wireToggle(key){
      setTimeout(function(){
        var t=document.getElementById('tog_'+key); var i=document.getElementById('ind_'+key);
        if(t&&i) t.addEventListener('click',function(){t.classList.toggle('open');i.classList.toggle('open');});
      },0);
    }
    function clean(n){return String(n).replace(/ PT$| OF$| DF$| RI$| CL$| RP$| PO$| RA$/,'');}
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    // Load immediately
    loadResults();

  })();
  </script>
</body>
</html>
