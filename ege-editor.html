<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EGE · Data Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08052f; --bg2:#0d0930; --card:#111040; --border:rgba(35,26,165,.3);
  --orange:#e75719; --blue:#231aa5; --text:#c4bfdf; --muted:#6b6590;
  --head:#fff; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
  --font-mono:'Share Tech Mono',monospace;
  --font-disp:'Barlow Condensed',sans-serif;
  --font-body:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body)}

/* ── DROP ZONE ── */
#drop-screen{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  background:var(--bg);
}
#drop-screen.drag-over{background:rgba(8,5,47,.95)}
.drop-zone{
  width:min(520px,90vw);padding:60px 40px;
  border:2px dashed rgba(35,26,165,.5);border-radius:20px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  cursor:pointer;transition:border-color .2s,background .2s;
  background:rgba(35,26,165,.04);
}
.drop-zone:hover,.drag-over .drop-zone{border-color:var(--orange);background:rgba(231,87,25,.04)}
.drop-icon{width:64px;height:64px;color:var(--orange);opacity:.7}
.drop-title{font-family:var(--font-disp);font-weight:900;font-size:2rem;text-transform:uppercase;color:var(--head);letter-spacing:.04em}
.drop-sub{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-align:center;line-height:1.8}
.drop-sub span{color:var(--orange)}
.drop-btn{
  padding:12px 32px;background:var(--orange);border:none;border-radius:6px;
  font-family:var(--font-disp);font-weight:700;font-size:.95rem;letter-spacing:.1em;
  text-transform:uppercase;color:#fff;cursor:pointer;transition:opacity .15s;
}
.drop-btn:hover{opacity:.85}
#file-input{display:none}
.drop-files-hint{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* ── APP LAYOUT ── */
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;background:rgba(8,5,47,.97);
  border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;
}
.logo{font-family:var(--font-disp);font-weight:900;font-size:1.05rem;letter-spacing:.14em;text-transform:uppercase;color:var(--head);white-space:nowrap}
.logo em{color:var(--orange);font-style:normal}
.header-center{flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
.file-chip{
  padding:5px 14px;border-radius:20px;font-family:var(--font-mono);font-size:.65rem;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.file-chip:hover{border-color:rgba(231,87,25,.4);color:var(--text)}
.file-chip.active{background:rgba(231,87,25,.15);border-color:var(--orange);color:var(--orange)}
.file-chip .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--orange);margin-left:5px;vertical-align:middle;opacity:0;transition:opacity .15s}
.file-chip.dirty .dot{opacity:1}
.hbtns{display:flex;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:5px;border:none;font-family:var(--font-disp);font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.85}.btn:active{transform:scale(.97)}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--orange);color:#fff}
.btn-ghost{background:rgba(35,26,165,.3);color:var(--text);border:1px solid var(--border)}
.btn-success{background:rgba(34,197,94,.18);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.btn-danger{background:rgba(239,68,68,.14);color:var(--red);border:1px solid rgba(239,68,68,.25)}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:220px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;
}
.sb-head{padding:12px 14px 8px;font-family:var(--font-mono);font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
.sb-head::before{content:'// ';opacity:.5}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-search input{width:100%;background:rgba(35,26,165,.12);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:.75rem;color:var(--text);outline:none;font-family:var(--font-mono)}
.sb-search input:focus{border-color:var(--orange)}
.sb-search input::placeholder{color:var(--muted)}
.sb-list{flex:1;overflow-y:auto;padding:4px 0}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-item{padding:8px 14px;font-size:.8rem;cursor:pointer;border-left:3px solid transparent;transition:all .12s;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:hover{background:rgba(35,26,165,.1)}
.sb-item.active{border-left-color:var(--orange);background:rgba(231,87,25,.07);color:var(--head)}
.sb-item .tag{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);margin-left:5px}
.sb-footer{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.sb-footer .btn{width:100%;justify-content:center}

/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;gap:10px;padding:8px 18px;
  background:rgba(8,5,47,.7);border-bottom:1px solid var(--border);flex-shrink:0;
}
.toolbar-title{flex:1;font-family:var(--font-disp);font-weight:700;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;color:var(--head);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toolbar-title .dim{color:var(--muted);font-weight:400}
.view-pills{display:flex;gap:2px;background:rgba(35,26,165,.15);border:1px solid var(--border);border-radius:5px;padding:3px}
.vp{padding:4px 12px;border:none;border-radius:3px;font-family:var(--font-mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:transparent;color:var(--muted);transition:all .12s}
.vp.on{background:var(--orange);color:#fff}

/* PANELS */
.panel{flex:1;overflow:auto;display:none}
.panel.on{display:flex;flex-direction:column}
.panel::-webkit-scrollbar{width:5px}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* CODE PANEL */
#code-panel textarea{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-family:var(--font-mono);font-size:.8rem;line-height:1.75;
  color:#cdd9e5;padding:20px 22px;tab-size:2;width:100%;min-height:100%;
}

/* FORM PANEL */
#form-panel{padding:20px 22px;gap:14px}
.fsec{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0}
.fsec-head{
  padding:10px 16px;font-family:var(--font-mono);font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--orange);background:rgba(231,87,25,.05);
  border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
}
.fsec-head::before{content:'// ';opacity:.45}
.fsec-body{padding:16px;display:flex;flex-direction:column;gap:10px}
.frow{display:flex;gap:10px;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.fg.wide{flex:2}.fg.full{flex:9999;min-width:100%}
.fg label{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.fg input,.fg select,.fg textarea{
  background:rgba(35,26,165,.1);border:1px solid var(--border);border-radius:5px;
  padding:7px 10px;font-size:.8rem;color:var(--text);outline:none;
  transition:border-color .15s;font-family:var(--font-mono);
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--orange)}
.fg select option{background:#0d0930}
.fg textarea{resize:vertical;min-height:70px;line-height:1.55}
.fg input[type=checkbox]{width:16px;height:16px;accent-color:var(--orange);cursor:pointer;margin-top:4px}
.form-actions{display:flex;gap:10px;flex-wrap:wrap;padding-top:4px;padding-bottom:8px;flex-shrink:0}

/* TABLE PANEL */
#table-panel{overflow:auto}
table{width:100%;border-collapse:collapse;font-size:.75rem}
thead tr{background:rgba(35,26,165,.18);position:sticky;top:0;z-index:1}
th{padding:10px 10px;font-family:var(--font-mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(35,26,165,.12);transition:background .1s;cursor:pointer}
tbody tr:hover{background:rgba(231,87,25,.05)}
tbody tr.selected{background:rgba(231,87,25,.1)}
td{padding:8px 10px;color:var(--text);white-space:nowrap;font-family:var(--font-mono);font-size:.73rem}
td.bold{color:var(--head);font-weight:700}
td .win{color:var(--green)}.td .loss{color:var(--red)}
td.star::after{content:' ★';color:var(--yellow);font-size:.65rem}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.35}
.empty svg{width:52px;height:52px;color:var(--orange)}
.empty p{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase}

/* STATUS */
.statusbar{
  display:flex;align-items:center;gap:16px;padding:5px 18px;
  background:rgba(4,2,22,.9);border-top:1px solid var(--border);
  font-family:var(--font-mono);font-size:.62rem;color:var(--muted);flex-shrink:0;
}
.st-ok{color:var(--green)}.st-w{color:var(--yellow)}.st-e{color:var(--red)}
.statusbar span{white-space:nowrap}

/* TOAST */
#toast{
  position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--orange);color:#fff;padding:9px 22px;border-radius:6px;
  font-family:var(--font-disp);font-weight:700;font-size:.85rem;letter-spacing:.06em;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.g{background:rgba(34,197,94,.9)}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(4,2,20,.85);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center;padding:20px}
.mbg.on{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.modal::-webkit-scrollbar{width:5px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mt{font-family:var(--font-disp);font-weight:900;font-size:.95rem;letter-spacing:.1em;text-transform:uppercase;color:var(--head)}
.mx{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:4px;transition:color .15s}
.mx:hover{color:var(--orange)}
.mb{padding:20px;display:flex;flex-direction:column;gap:12px}
.mf{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border)}

.player-hs-corner{
  position:absolute;top:8px;right:12px;
  width:72px;height:72px;border-radius:50%;
  object-fit:cover;object-position:top center;
  border:2px solid rgba(231,87,25,.4);
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  opacity:.9;
  pointer-events:none;
}
.fsec-head{position:relative;}
/* Row in table that's being edited */
.edit-row-highlight{background:rgba(231,87,25,.15) !important}
</style>
</head>
<body>

<!-- ══ DROP SCREEN ══ -->
<div id="drop-screen">
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17,8 12,3 7,8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <div class="drop-title">Drop File Here</div>
    <div class="drop-sub">
      Accepts: <span>player-stats.js</span> · <span>team-stats.js</span><br>
      <span>league-history.js</span> · <span>player-games.js</span>
    </div>
    <button class="drop-btn" onclick="event.stopPropagation();document.getElementById('file-input').click()">Browse Files</button>
  </div>
  <div class="drop-files-hint">You can also drop multiple files at once</div>
  <input type="file" id="file-input" accept=".js" multiple>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <header>
    <div class="logo">EGE <em>NBA</em> · Editor</div>
    <div class="header-center" id="file-chips"></div>
    <div class="hbtns">
      <button class="btn btn-ghost" onclick="document.getElementById('file-input2').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Open
      </button>
      <button class="btn btn-primary" onclick="saveFile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Download
      </button>
      <input type="file" id="file-input2" accept=".js" multiple style="display:none">
    </div>
  </header>

  <div class="main">
    <div class="sidebar">
      <div class="sb-head" id="sb-label">Entries</div>
      <div class="sb-search"><input id="sb-filter" placeholder="Filter…" oninput="filterSB(this.value)"></div>
      <div class="sb-list" id="sb-list"></div>
      <div class="sb-footer">
        <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="openAddModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Entry
        </button>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-title" id="tool-title"><span class="dim">Select an entry</span></div>
        <div class="view-pills" id="view-pills" style="display:none">
          <button class="vp on" id="vp-form" onclick="setView('form')">Form</button>
          <button class="vp" id="vp-table" onclick="setView('table')">Table</button>
          <button class="vp" id="vp-code" onclick="setView('code')">Code</button>
        </div>
        <button class="btn btn-danger" id="del-btn" style="display:none" onclick="deleteEntry()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/></svg>
          Delete
        </button>
      </div>

      <div class="panel on" id="form-panel"></div>
      <div class="panel" id="table-panel"></div>
      <div class="panel" id="code-panel">
        <textarea id="code-ta" spellcheck="false" oninput="onCodeEdit()" onkeydown="handleTab(event)"></textarea>
      </div>

      <div class="empty" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/>
        </svg>
        <p>Drop a file or select an entry</p>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="st-msg" class="st-ok">Ready</span>
    <span id="st-type"></span>
    <span id="st-count"></span>
    <span id="st-size"></span>
  </div>
</div>

<!-- ADD MODAL -->
<div class="mbg" id="add-modal">
  <div class="modal">
    <div class="mh"><div class="mt" id="modal-title">Add Entry</div><button class="mx" onclick="closeModal()">✕</button></div>
    <div class="mb" id="modal-body"></div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  EGE DATA EDITOR — MAIN SCRIPT
// ══════════════════════════════════════════════════════

const S = { files:{}, active:null, entry:null, view:'form' };

// ── STRING HELPERS ──
function unescapeJS(s) {
  return (s||'').replace(/\\'/g,"'").replace(/\\"/g,'"').replace(/\\\\/g,'\\');
}
function escapeJS(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function capitalize(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

// ── FIELD VALUE HELPERS ──
function ext(content, field) {
  var p1 = new RegExp(field+":\\s*'((?:[^'\\\\]|\\\\.)*)'");
  var p2 = new RegExp(field+':\\s*"((?:[^"\\\\]|\\\\.)*)"');
  var m = content.match(p1) || content.match(p2);
  return m ? unescapeJS(m[1]) : '';
}
function extNum(content, field) {
  var m = content.match(new RegExp('[\\s,{]'+field+':\\s*([\\d.]+)'));
  return m ? m[1] : '';
}
function extBool(content, field) {
  var m = content.match(new RegExp('[\\s,{]'+field+':\\s*(true|false)'));
  return m ? m[1]==='true' : false;
}
function extVal(r, field) { return esc(ext(r, field)); }
function v(id) { var e=document.getElementById(id); return e?e.value:''; }
function vc(id) { var e=document.getElementById(id); return e?e.checked:false; }

// ── FILE TYPE DETECTION ──
function detectType(name, content) {
  if (name==='player-stats.js'   || content.includes('window.PLAYER_STATS'))        return 'player-stats';
  if (name==='team-stats.js'     || content.includes('window.EGE_SEASON_STATS'))    return 'team-stats';
  if (name==='league-history.js' || content.includes('window.EGE_LEAGUE_HISTORY')) return 'league-history';
  if (name==='player-games.js'   || content.includes('window.PLAYER_GAMES'))        return 'player-games';
  return 'unknown';
}

// ── FILE LOADING ──
function initFileInputs() {
  document.getElementById('file-input').onchange  = function(e){ loadFileList(Array.from(e.target.files)); };
  document.getElementById('file-input2').onchange = function(e){ loadFileList(Array.from(e.target.files)); };
}

function loadFileList(files) {
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var content = e.target.result;
      var type = detectType(file.name, content);
      S.files[file.name] = { content:content, dirty:false, type:type };
      refreshChips();
      if (!S.active || S.active===file.name) switchFile(file.name);
      toast('Loaded: '+file.name, true);
    };
    reader.readAsText(file);
  });
  document.getElementById('drop-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}

// ── DRAG & DROP ──
function initDrop() {
  var ds = document.getElementById('drop-screen');
  document.body.addEventListener('dragover', function(e) { e.preventDefault(); ds.classList.add('drag-over'); });
  document.body.addEventListener('dragleave', function(e) { if (!e.relatedTarget) ds.classList.remove('drag-over'); });
  document.body.addEventListener('drop', function(e) {
    e.preventDefault();
    ds.classList.remove('drag-over');
    loadFileList(Array.from(e.dataTransfer.files));
  });
}

// ── FILE CHIPS ──
function refreshChips() {
  var el = document.getElementById('file-chips');
  el.innerHTML = '';
  Object.keys(S.files).forEach(function(name) {
    var f = S.files[name];
    var c = document.createElement('button');
    c.className = 'file-chip'+(S.active===name?' active':'')+(f.dirty?' dirty':'');
    c.dataset.name = name;
    c.innerHTML = name.replace('.js','')+'<span class="dot"></span>';
    c.onclick = function(){ switchFile(name); };
    el.appendChild(c);
  });
}

function getEntries(content, type) {
  var entries = [], m, r;
  if (type==='player-stats') {
    // find keys inside window.PLAYER_STATS = { ... }
    var statsBlock = content.match(/window\.PLAYER_STATS\s*=\s*\{([\s\S]*)/);
    var block = statsBlock ? statsBlock[1] : content;
    var re = /\n  (\w+):\s*\{/g;
    while ((m=re.exec(block))!==null) entries.push({key:m[1],label:capitalize(m[1])});
  } else if (type==='player-games') {
    var re2 = /\n  (\w+):\s*\[/g;
    while ((m=re2.exec(content))!==null) entries.push({key:m[1],label:capitalize(m[1])});
  } else if (type==='team-stats') {
    var re3 = /"(\d{4}-\d{2,4})":/g;
    var seen = {};
    while ((m=re3.exec(content))!==null) { if (!seen[m[1]]) { seen[m[1]]=1; entries.push({key:m[1],label:m[1]}); } }
  } else if (type==='league-history') {
    var re4 = /season:\s*'(\d{4}-\d{2,4})'/g;
    while ((m=re4.exec(content))!==null) entries.push({key:m[1],label:m[1]});
  }
  return entries;
}

// ── RAW EXTRACT ──
function extractRaw(content, type, key) {
  var idx, end;
  if (type==='player-stats') {
    idx = content.search(new RegExp('\\n  '+key+':\\s*\\{'));
    if (idx<0) return '';
    var ob = idx+content.slice(idx).search(/\{/);
    end = findBlockEnd(content, ob);
    return content.slice(idx+1, end+1).trimEnd();
  }
  if (type==='player-games') {
    idx = content.search(new RegExp('\\n  '+key+':\\s*\\['));
    if (idx<0) return '';
    var ob2 = idx+content.slice(idx).search(/\[/);
    end = findArrayEnd(content, ob2);
    return content.slice(idx+1, end+1).trimEnd();
  }
  if (type==='team-stats') {
    idx = content.indexOf('"'+key+'":');
    if (idx<0) return '';
    end = findBlockEnd(content, content.indexOf('{',idx));
    return content.slice(idx, end+1).trimEnd();
  }
  if (type==='league-history') {
    idx = content.indexOf("season: '"+key+"'");
    if (idx<0) return '';
    var bs = content.lastIndexOf('{',idx);
    end = content.indexOf('},',idx);
    return content.slice(bs, end+2).trimEnd();
  }
  return '';
}

function findBlockEnd(str, openIdx) {
  var depth=0, i=openIdx;
  while (i<str.length) { if (str[i]==='{') depth++; else if (str[i]==='}') { depth--; if (depth===0) return i; } i++; }
  return str.length-1;
}
function findArrayEnd(str, openIdx) {
  var depth=0, i=openIdx;
  while (i<str.length) { if (str[i]==='[') depth++; else if (str[i]===']') { depth--; if (depth===0) return i; } i++; }
  return str.length-1;
}

    if (idx2<0) return toast('Entry not found');
    var ob2 = idx2+f.content.slice(idx2).search(/\[/);
    var end2 = findArrayEnd(f.content, ob2);
    f.content = f.content.slice(0,idx2+1)+newBlock+f.content.slice(end2+1);
  } else if (type==='team-stats') {

function getSigsRange(key) {
  var f=S.files[S.active]; var re2=new RegExp('\\n  '+key+':\\s*\\{');
  var pidx=f.content.search(re2); if (pidx<0) return null;
  var ss=f.content.indexOf('        sigs: [',pidx);
  var se=f.content.indexOf('\n      ]\n    },\n    jerseys:',pidx);
  if (ss<0||se<0) return null;
  return {ss:ss,se:se};
}
function parseSigsList(key) {
  var f=S.files[S.active]; var r=getSigsRange(key); if (!r) return [];
  var block=f.content.slice(r.ss,r.se);
  return block.match(/\{\s*name:[^}]*\}/gs)||[];
}
function rebuildSigs(key, newSigsArr) {
  var f=S.files[S.active]; var r=getSigsRange(key); if (!r) return toast('Cannot find sigs');
  f.content=f.content.slice(0,r.ss)+'        sigs: [\n'+newSigsArr.join('\n')+'\n'+f.content.slice(r.se);
  markDirty(); toast('Shoes updated \u2713',true); buildFormPanel(f.content,'player-stats',key);
}
function sigToStr(name, thumb, cws) {
  var cwLines=cws.map(function(c){ return "            { name: '"+c.n+"', img: '"+c.i+"' }"; }).join(',\n');
  return "        {\n          name: '"+name+"',\n          thumbnail: '"+thumb+"',\n          colorways: [\n"+cwLines+"\n          ]\n        },";
}
function getCWsFromBlock(sm) {
  var cwBlock=sm.match(/colorways:\s*\[([\s\S]*?)\]/); if (!cwBlock) return [];
  return (cwBlock[1].match(/\{[^}]+\}/g)||[]).map(function(c){ return {n:ext(c,'name'),i:ext(c,'img')}; });
}

function applyCWs(si, cwCount, key) {
  var sigs=parseSigsList(key);
  var newSigs=sigs.map(function(sm,idx) {
    if (idx!==si) return sm.trim()+',';
    var cws=[];
    for (var ci=0;ci<cwCount;ci++) {
      var ne=document.getElementById('cw_'+si+'_'+ci+'_name'); if (!ne) continue;
      cws.push({n:ne.value, i:(document.getElementById('cw_'+si+'_'+ci+'_img')||{}).value||''});
    }
    return sigToStr(v('shoe_'+si+'_name'),v('shoe_'+si+'_thumb'),cws);
  });
  rebuildSigs(key, newSigs);
}
function addCW(si, key) {
  var sigs=parseSigsList(key);
  var newSigs=sigs.map(function(sm,idx) {
    if (idx!==si) return sm.trim()+',';
    var cws=getCWsFromBlock(sm);
    cws.push({n:v('new_cw_'+si+'_name'), i:v('new_cw_'+si+'_img')});
    return sigToStr(v('shoe_'+si+'_name'),v('shoe_'+si+'_thumb'),cws);
  });
  rebuildSigs(key, newSigs);
}
function delCW(si, ci, key) {
  var sigs=parseSigsList(key);
  var newSigs=sigs.map(function(sm,idx) {
    if (idx!==si) return sm.trim()+',';
    var cws=getCWsFromBlock(sm).filter(function(_,i){ return i!==ci; });
    return sigToStr(v('shoe_'+si+'_name'),v('shoe_'+si+'_thumb'),cws);
  });
  rebuildSigs(key, newSigs);
}
function delShoeLine(si, key) {
  if (!confirm('Remove this shoe line?')) return;
  var sigs=parseSigsList(key);
  var newSigs=sigs.filter(function(_,i){ return i!==si; }).map(function(sm){ return sm.trim()+','; });
  rebuildSigs(key, newSigs);
}
function addShoeLine(key) {
  var sigs=parseSigsList(key);
  sigs.push(sigToStr(v('new_shoe_name'),v('new_shoe_thumb'),[]));
  rebuildSigs(key, sigs.map(function(s){ return typeof s==='string'&&!s.endsWith(',') ? s+',' : s; }));
}
function applyBrand(sigCount, key) {
  var f=S.files[S.active]; var re2=new RegExp('\\n  '+key+':\\s*\\{');
  var pidx=f.content.search(re2); if (pidx<0) return toast('Player not found');
  var bm=f.content.slice(pidx).match(/brand:\s*'([^']*)'/); if (!bm) return;
  var abs=pidx+bm.index;
  f.content=f.content.slice(0,abs)+"brand: '"+v('shoes_brand')+"'"+f.content.slice(abs+bm[0].length);
  markDirty(); toast('Brand updated \u2713',true);
}

function buildPGForm(content, key, pane) {
  var re2=new RegExp('\\n  '+key+':\\s*\\[');
  var idx=content.search(re2); if (idx<0) { pane.innerHTML='<div style="padding:20px;color:var(--muted)">Player not found</div>'; return; }
  var ob=idx+content.slice(idx).search(/\[/);
  var end=findArrayEnd(content,ob);
  var block=content.slice(ob,end+1);
  var games=block.match(/\{[^}]+\}/g)||[];

  var s=sec('Game Log ('+games.length+' games)');
  var b=secBody(s);
  b.innerHTML='<div style="font-family:var(--font-mono);font-size:.72rem;color:var(--muted);line-height:2">'
    +games.slice(0,8).map(function(g){ return '<span style="color:var(--orange)">'+(ext(g,'season')||'?')+'</span> <span>'+(/type:'playoffs'/.test(g)?'PO':'RS')+'</span>'; }).join(' &middot; ')
    +(games.length>8?' <span>...+'+(games.length-8)+' more</span>':'')
    +'</div>';
  pane.appendChild(s);

  var s2=sec('Add Game Entry'); var b2=secBody(s2);
  b2.appendChild(row([fg('pg_season','Season','text','','2034-35'), fgSel('pg_type','Type',[{v:'regular',l:'Regular'},{v:'playoffs',l:'Playoffs'}],'regular'), fg('pg_game','Game #','text','','(playoffs)'), fg('pg_opp','Opponent','text','','LAL'), fgSel('pg_result','Result',[{v:'W',l:'Win'},{v:'L',l:'Loss'}],'W'), fg('pg_score','Score','text','','118-104'), fg('pg_home','Home','checkbox',true)]));
  b2.appendChild(row([fg('pg_pts','PTS','text','','24'), fg('pg_reb','REB','text','','5'), fg('pg_ast','AST','text','','8'), fg('pg_stl','STL','text','','1'), fg('pg_blk','BLK','text','','0'), fg('pg_tov','TOV','text','','2'), fg('pg_min','MIN','text','','36')]));
  b2.appendChild(row([fg('pg_fgm','FGM','text','','9'), fg('pg_fga','FGA','text','','18'), fg('pg_tpm','3PM','text','','3'), fg('pg_tpa','3PA','text','','7'), fg('pg_ftm','FTM','text','','3'), fg('pg_fta','FTA','text','','4')]));
  var btns=document.createElement('div'); btns.className='form-actions';
  btns.appendChild(actBtn('+ Add Game', function(){ addPGRow(key); }, 'success'));
  b2.appendChild(btns);
  pane.appendChild(s2);
}

function addPGRow(key) {
  var f=S.files[S.active];
  var gf=v('pg_game'); var gField=gf?' game:'+(gf||0)+',':'';
  var nr='{ season:\''+v('pg_season')+'\', type:\''+v('pg_type')+'\''+gField+'\n  opp:\''+v('pg_opp')+'\', result:\''+v('pg_result')+'\', score:\''+v('pg_score')+'\', home:'+vc('pg_home')+',\n  pts:'+(v('pg_pts')||0)+', reb:'+(v('pg_reb')||0)+', ast:'+(v('pg_ast')||0)+', stl:'+(v('pg_stl')||0)+', blk:'+(v('pg_blk')||0)+', tov:'+(v('pg_tov')||0)+',\n  fgm:'+(v('pg_fgm')||0)+', fga:'+(v('pg_fga')||0)+', tpm:'+(v('pg_tpm')||0)+', tpa:'+(v('pg_tpa')||0)+', ftm:'+(v('pg_ftm')||0)+', fta:'+(v('pg_fta')||0)+', min:'+(v('pg_min')||0)+',\n},';
  var re2=new RegExp('\\n  '+key+':\\s*\\[');
  var idx=f.content.search(re2); if (idx<0) return toast('Player not found');
  var ob=idx+f.content.slice(idx).search(/\[/);
  f.content=f.content.slice(0,ob+1)+'\n\n'+nr+f.content.slice(ob+1);
  markDirty(); toast('Game added \u2713',true);
  buildFormPanel(f.content,'player-games',key);
}

// ─────────────────────────────────────────────────────
//  TEAM STATS FORM
// ─────────────────────────────────────────────────────
function buildTSForm(content, season, pane) {
  var s=sec('Team Stats: '+season); var b=secBody(s);
  b.innerHTML='<div style="font-family:var(--font-mono);font-size:.72rem;color:var(--muted);line-height:2">Team stats are best edited in Code View or Table View.<br>Switch using the tabs above.</div>';
  var btns=document.createElement('div'); btns.className='form-actions';
  btns.appendChild(actBtn('Open Code View', function(){ setView('code'); }));
  btns.appendChild(actBtn('Open Table View', function(){ setView('table'); }));
  b.appendChild(btns);
  pane.appendChild(s);
}

// ══════════════════════════════════════════════════════
//  TABLE PANEL
// ══════════════════════════════════════════════════════
function buildTablePanel(content, type, key) {
  var pane=document.getElementById('table-panel'); pane.innerHTML='';
  if (type==='player-stats') buildPSTable(content, key, pane);
  else if (type==='player-games') buildPGTable(content, key, pane);
  else if (type==='team-stats') buildTSTable(content, key, pane);
  else if (type==='league-history') buildLHTable(content, pane);
}
function makeTable(headers, rows) {
  var wrap=document.createElement('div'); wrap.style.cssText='overflow:auto;flex:1;';
  var t=document.createElement('table');
  t.innerHTML='<thead><tr>'+headers.map(function(h){ return '<th>'+h+'</th>'; }).join('')+'</tr></thead>'
    +'<tbody>'+rows.map(function(r){ return '<tr>'+r.map(function(c,i){ return '<td'+(i===0?' class="bold"':'')+'>'+esc(String(c||''))+'</td>'; }).join('')+'</tr>'; }).join('')+'</tbody>';
  wrap.appendChild(t); return wrap;
}
function buildPSTable(content, key, pane) {
  var block=getPlayerBlock(content,key); if (!block) return;
  var rows=parseRegular(block);
  pane.appendChild(makeTable(['SEASON','AGE','TEAM','GP','GS','MPG','PPG','RPG','APG','SPG','BPG','TO','FG%','3P%','FT%','3PA'],
    rows.map(function(r){ return [r.season,r.age,r.team,r.gp,r.gs,r.mpg,r.ppg,r.rpg,r.apg,r.spg,r.bpg,r.topg,r.fgp,r.tpp,r.ftp,r.tpa]; })));
}
function buildPGTable(content, key, pane) {
  var re2=new RegExp('\\n  '+key+':\\s*\\[');
  var idx=content.search(re2); if (idx<0) return;
  var ob=idx+content.slice(idx).search(/\[/);
  var end=findArrayEnd(content,ob);
  var block=content.slice(ob,end+1);
  var games=block.match(/\{[^}]+\}/g)||[];
  var rows=games.map(function(g){ return [ext(g,'season'),/type:'playoffs'/.test(g)?'PO':'RS',ext(g,'opp'),ext(g,'result'),ext(g,'score'),extNum(g,'pts'),extNum(g,'reb'),extNum(g,'ast'),extNum(g,'stl'),extNum(g,'blk'),extNum(g,'tov'),extNum(g,'min')]; });
  pane.appendChild(makeTable(['SEASON','TYPE','OPP','W/L','SCORE','PTS','REB','AST','STL','BLK','TOV','MIN'],rows));
}
function buildTSTable(content, season, pane) {
  var idx=content.indexOf('"'+season+'":'); if (idx<0) return;
  var end=findBlockEnd(content,content.indexOf('{',idx));
  var block=content.slice(idx,end+1);
  var rows=[]; var re2=/(\w+):\s*\{[^}]*record:\s*"([^"]+)"[^}]*pct:\s*"([^"]+)"[^}]*rank:\s*"([^"]+)"[^}]*playoffs:\s*"([^"]+)"/g; var m;
  while ((m=re2.exec(block))!==null) rows.push([m[1],m[2],m[3],m[4],m[5]]);
  pane.appendChild(makeTable(['TEAM SLUG','RECORD','PCT','RANK','PLAYOFFS'],rows));
}
function buildLHTable(content, pane) {
  var rows=[]; var re2=/season:\s*'(\d{4}-\d{2,4})'/g; var m;
  while ((m=re2.exec(content))!==null) {
    var s2=m[1];
    var idx=content.indexOf("season: '"+s2+"'");
    var block=content.slice(content.lastIndexOf('{',idx),content.indexOf('},',idx)+2);
    rows.push([s2,ext(block,'mvp'),ext(block,'roty'),ext(block,'dpoy'),ext(block,'champion'),ext(block,'finals_mvp')]);
  }
  pane.appendChild(makeTable(['SEASON','MVP','ROTY','DPOY','CHAMPION','FINALS MVP'],rows));
}

// ══════════════════════════════════════════════════════
//  ADD MODAL
// ══════════════════════════════════════════════════════
function openAddModal() {
  if (!S.active) return toast('Open a file first');
  var f=S.files[S.active]; var type=f.type;
  var modal=document.getElementById('add-modal');
  var body=document.getElementById('modal-body');
  var title=document.getElementById('modal-title');
  body.innerHTML='';

  if (type==='league-history') {
    title.textContent='Add Season';
    var d1=document.createElement('div'); d1.className='frow';
    d1.appendChild(fg('new_season','Season','text','','2034-35'));
    d1.appendChild(fg('new_champion','Champion','text','','Golden State Warriors'));
    body.appendChild(d1);
  } else if (type==='player-stats') {
    title.textContent='Add Player';
    var d2=document.createElement('div'); d2.className='frow';
    d2.appendChild(fg('new_key','Player Key (no spaces)','text','','clark'));
    d2.appendChild(fg('new_height','Height','text','',"6'5\""));
    d2.appendChild(fg('new_weight','Weight','text','','210 lbs'));
    body.appendChild(d2);
  } else if (type==='player-games') {
    title.textContent='Add Player Log';
    var d3=document.createElement('div'); d3.className='frow';
    d3.appendChild(fg('new_pgkey','Player Key','text','','clark'));
    body.appendChild(d3);
  } else {
    title.textContent='Add Season';
    var d4=document.createElement('div'); d4.className='frow';
    d4.appendChild(fg('new_ts_season','Season','text','','2037-38'));
    body.appendChild(d4);
  }
  modal.classList.add('on');
}
function closeModal() { document.getElementById('add-modal').classList.remove('on'); }
function confirmAdd() {
  var f=S.files[S.active]; var type=f.type;
  if (type==='league-history') {
    var s2=v('new_season');
    var nb="\n  {\n    season: '"+s2+"',\n    champion: '"+v('new_champion')+"',\n    mvp: '',  mvp_team: '',  mvp_headshot: '',\n    roty: '',  roty_team: '',  roty_headshot: '',\n    dpoy: '',  dpoy_team: '',  dpoy_headshot: '',\n    mip: '',  mip_team: '',  mip_headshot: '',\n    sixmoty: '',  sixmoty_team: '',  sixmoty_headshot: '',\n    finals_mvp: '',  finals_mvp_team: '',  finals_mvp_headshot: '',\n  },";
    f.content=f.content.replace(/\];\s*$/,nb+'\n\n];');
  } else if (type==='player-stats') {
    var k2=v('new_key').trim();
    var nb2="\n\n  "+k2+": {\n    info: { height: '"+v('new_height')+"', weight: '"+v('new_weight')+"', age: '-', college: '-', draftYear: '-', draftPick: '-', nickname: '-' },\n    retired: false,\n    regular: [],\n    playoffs: [],\n    totals: [],\n    jerseys: [],\n    awards: {},\n    careerHighs: [],\n    playoffCareerHighs: [],\n    shoes: { brand: '', sigs: [] },\n    contracts: { signings: [], trades: [], seasons: [] },\n  },";
    f.content=f.content.replace(/\n\};\s*$/,nb2+'\n\n};');
  } else if (type==='player-games') {
    var k3=v('new_pgkey').trim();
    f.content=f.content.replace(/\n\};\s*$/,'\n  '+k3+': [\n  ],\n\n};');
  } else {
    var ss=v('new_ts_season');
    f.content=f.content.replace(/\n\};\s*$/,'\n  "'+ss+'": {\n  },\n\n};');
  }
  markDirty(); closeModal(); buildSidebar(); toast('Entry added \u2713',true);
}

// ══════════════════════════════════════════════════════
//  DELETE ENTRY
// ══════════════════════════════════════════════════════
function deleteEntry() {
  if (!S.entry||!confirm('Delete "'+S.entry+'"?')) return;
  var f=S.files[S.active];
  var raw=extractRaw(f.content,f.type,S.entry);
  if (raw) f.content=f.content.replace(raw,'').replace(/\n{3,}/g,'\n\n');
  markDirty(); S.entry=null; buildSidebar(); showEmpty(); toast('Deleted',true);
}

// ══════════════════════════════════════════════════════
//  SAVE / DOWNLOAD
// ══════════════════════════════════════════════════════
function saveFile() {
  if (!S.active) return toast('No file loaded');
  var f=S.files[S.active];
  if (S.view==='code') f.content=document.getElementById('code-ta').value;
  var blob=new Blob([f.content],{type:'text/javascript'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=S.active; a.click();
  URL.revokeObjectURL(url);
  f.dirty=false; refreshChips(); toast('Downloaded: '+S.active,true);
}

// ══════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════
function markDirty() {
  if (!S.active) return;
  S.files[S.active].dirty=true;
  document.querySelectorAll('.file-chip').forEach(function(c){ if (c.dataset.name===S.active) c.classList.add('dirty'); });
  setStatus('Unsaved changes \u2014 click Download to save','w');
}
var toastTimer;
function toast(msg, ok) {
  var t=document.getElementById('toast'); t.textContent=msg;
  t.className='on'+(ok?' g':'');
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.className=''; },2400);
}
function setStatus(msg, type) {
  var el=document.getElementById('st-msg'); el.textContent=msg;
  el.className={ok:'st-ok',w:'st-w',e:'st-e'}[type]||'st-ok';
}
function handleTab(e) {
  if (e.key==='Tab') {
    e.preventDefault();
    var ta=e.target, s=ta.selectionStart;
    ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(ta.selectionEnd);
    ta.selectionStart=ta.selectionEnd=s+2;
  }
  if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); saveFile(); }
}
document.getElementById('code-ta').addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') { e.preventDefault(); applyCodeEdit(); }
});

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
initFileInputs();
initDrop();

</script>
